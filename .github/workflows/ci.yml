# CI/CD — qualité Python, build Docker, Trivy, push ECR et redéploiement ECS (push main uniquement).
# Auth AWS : OIDC (role-to-assume). Pas de Terraform apply/destroy en CI.
name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 app tests

      - name: Format (black --check)
        run: black --check app tests

      - name: Tests (pytest)
        run: pytest -v

      - name: Build Docker
        run: docker build -t cloudops-incident-api:ci .

      - name: Cache base de données Trivy
        uses: actions/cache@v4
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-v1
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Scan Trivy (CRITICAL — bloquant)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cloudops-incident-api:ci
          scan-type: image
          format: table
          severity: CRITICAL
          exit-code: "1"
          cache-dir: /tmp/trivy-cache

      - name: Scan Trivy (HIGH — avertissement)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cloudops-incident-api:ci
          scan-type: image
          format: table
          severity: HIGH
          exit-code: "0"
          cache-dir: /tmp/trivy-cache

      # --- CD : uniquement sur push vers main (pas sur pull_request ni master) ---
      - name: Connexion AWS (OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image Docker vers ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          IMAGE_TAG_SHA: ${{ github.sha }}
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "ECR_REGISTRY=${ECR_REGISTRY}"
          docker tag cloudops-incident-api:ci "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          docker tag cloudops-incident-api:ci "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"

      - name: Redéploiement ECS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Vérification état ECS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Attente du démarrage des tâches (60 s)..."
          sleep 60
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query "services[0].{status:status,desired:desiredCount,running:runningCount,pending:pendingCount}"
