# CI — qualité Python + build Docker + scan sécurité Trivy (CRITICAL bloquant).
# Pas de déploiement AWS, pas de Terraform, pas de push ECR.
name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 app tests

      - name: Format (black --check)
        run: black --check app tests

      - name: Tests (pytest)
        run: pytest -v

      - name: Build Docker
        run: docker build -t cloud-incident-api:ci .

      - name: Cache base de données Trivy
        uses: actions/cache@v4
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-v1
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Scan Trivy (CRITICAL — bloquant)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cloud-incident-api:ci
          scan-type: image
          format: table
          severity: CRITICAL
          exit-code: "1"
          cache-dir: /tmp/trivy-cache

      - name: Scan Trivy (HIGH — avertissement)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cloud-incident-api:ci
          scan-type: image
          format: table
          severity: HIGH
          exit-code: "0"
          cache-dir: /tmp/trivy-cache
