# Terraform CI — fmt, validate, tflint, checkov (sans apply, sans accès AWS).
name: Terraform CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: terraform fmt -check
        run: terraform fmt -check -recursive infra/

      - name: terraform init (bootstrap)
        working-directory: infra/bootstrap
        run: terraform init -backend=false -input=false

      - name: terraform validate (bootstrap)
        working-directory: infra/bootstrap
        run: terraform validate

      - name: terraform init (dev)
        working-directory: infra/envs/dev
        run: terraform init -backend=false -input=false

      - name: terraform validate (dev)
        working-directory: infra/envs/dev
        run: terraform validate

      - name: Installation de TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.1

      - name: tflint --init
        working-directory: infra
        run: tflint --init

      - name: tflint (bootstrap)
        working-directory: infra/bootstrap
        run: tflint --format compact

      - name: tflint (dev)
        working-directory: infra/envs/dev
        run: tflint --format compact

      - name: Checkov (warning uniquement)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          quiet: true
          soft_fail: true
